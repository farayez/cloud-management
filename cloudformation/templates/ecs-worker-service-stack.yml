AWSTemplateFormatVersion: "2010-09-09"
Description: The template used to create an ECS Service from the ECS Console.
Parameters:
  ECSClusterName:
    Type: String
    Default: gokada-prod-primary
  ECSServiceName:
    Type: String
    Default: gokada-prod-central-worker
  SecurityGroupIDs:
    Type: CommaDelimitedList
    Default: sg-0afb6ace108c2ae06
  SubnetIDs:
    Type: CommaDelimitedList
    Default: subnet-9d0659fa,subnet-4d361704,subnet-904dd5cb
  VpcID:
    Type: String
    Default: vpc-31250a56
  LoadBalancerName:
    Type: String
    Default: ""
Resources:
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: gokada-prod-primary
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Base: 1
          Weight: 1
        - CapacityProvider: FARGATE_SPOT
          Base: 0
          Weight: 1
      TaskDefinition: arn:aws:ecs:eu-west-1:525408006129:task-definition/gokada-prod-central-worker:1
      ServiceName: gokada-prod-central-worker
      SchedulingStrategy: REPLICA
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups: !Ref SecurityGroupIDs
          Subnets: !Ref SubnetIDs
      PlatformVersion: LATEST
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      DeploymentController:
        Type: ECS
      ServiceConnectConfiguration:
        Enabled: false
      Tags: []
      PropagateTags: TASK_DEFINITION
      EnableECSManagedTags: true
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: "5"
      MinCapacity: "1"
      ResourceId: service/gokada-prod-primary/gokada-prod-central-worker
      RoleARN: arn:aws:iam::525408006129:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
    DependsOn:
      - ECSService
  AutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: cpu-utilization
      PolicyType: TargetTrackingScaling
      ResourceId: service/gokada-prod-primary/gokada-prod-central-worker
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: "70"
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
Outputs:
  ClusterName:
    Description: The cluster used to create the service.
    Value: !Ref ECSClusterName
  ECSService:
    Description: The created service.
    Value: !Ref ECSService
  AutoScalingTarget:
    Value: !Ref AutoScalingTarget
  AutoScalingPolicy:
    Value: !Ref AutoScalingPolicy
